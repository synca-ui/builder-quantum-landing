[build]
command = "bash scripts/netlify-build.sh"
functions = "netlify/functions"
edge_functions = "netlify/edge-functions"
publish = "dist/spa"

[build.environment]
NODE_VERSION = "22"
NPM_VERSION = "10"

[functions]
node_bundler = "nft"

# Performance optimizations
[build.processing]
skip_processing = true

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.html]
pretty_urls = true

[build.processing.images]
compress = true

# Security headers for all files
[[headers]]
for = "/*"
  [headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  # Allow Clerk's dynamic CDN subdomains + all resources Clerk needs
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.clerk.accounts.dev https://*.clerk.com https://clerk.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.clerk.accounts.dev https://*.clerk.com; font-src 'self' https://fonts.gstatic.com https://*.clerk.accounts.dev; img-src 'self' data: blob: https: https://*.clerk.accounts.dev https://*.clerk.com; connect-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://clerk.com https://builder-quantum-landing-production.up.railway.app wss://*.clerk.accounts.dev; frame-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://accounts.google.com; worker-src 'self' blob:; manifest-src 'self';"


# Cache static assets
[[headers]]
for = "/static/*"
values = { Cache-Control = "public, max-age=31536000, immutable" }

# Cache JavaScript files
[[headers]]
for = "/*.js"
values = { Cache-Control = "public, max-age=31536000, immutable" }

# Cache CSS files
[[headers]]
for = "/*.css"
values = { Cache-Control = "public, max-age=31536000, immutable" }

# PWA manifest should not be cached aggressively
[[headers]]
for = "/manifest.json"
values = { Cache-Control = "public, max-age=0, must-revalidate" }

# Service Worker should not be cached aggressively
[[headers]]
for = "/sw.js"
values = { Cache-Control = "public, max-age=0, must-revalidate" }

# API Weiterleitung an Railway
[[redirects]]
from = "/api/*"
to = "https://builder-quantum-landing-production.up.railway.app/api/:splat"
status = 200
force = true

# Fallback für Single-Page-Application
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Edge Function: Config-Injection für *.maitr.de Subdomains
# Läuft am CDN-Edge-Knoten VOR der SPA-Auslieferung.
# Injiziert window.__MAITR_CONFIG__ direkt ins HTML – kein client-seitiger fetch() nötig.
[[edge_functions]]
path = "/*"
function = "inject-site-config"